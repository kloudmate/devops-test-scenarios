---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-10-liveness-probe
  namespace: test-scenerios
  labels:
    scenario: "10-liveness-probe-failure"
    app: scenario-10
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-10
  template:
    metadata:
      labels:
        app: scenario-10
        scenario: "10-liveness-probe-failure"
    spec:
      containers:
        - name: app
          image: REGISTRY_PLACEHOLDER/scenario-10-liveness-probe-failure:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: scenario-10-config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            # Short timeout — Kubernetes marks the probe failed quickly
            # when /healthz blocks due to the deadlocked mutex.
            timeoutSeconds: 3
            periodSeconds: 10
            # Restart after 2 consecutive failures to trigger restarts quickly.
            failureThreshold: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
