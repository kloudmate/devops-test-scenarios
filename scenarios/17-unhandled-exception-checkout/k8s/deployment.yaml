---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-17-checkout
  namespace: test-scenerios
  labels:
    scenario: "17-unhandled-exception-checkout"
    app: scenario-17
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-17
  template:
    metadata:
      labels:
        app: scenario-17
        scenario: "17-unhandled-exception-checkout"
    spec:
      containers:
        - name: app
          image: REGISTRY_PLACEHOLDER/scenario-17-unhandled-exception-checkout:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: scenario-17-config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
      restartPolicy: Always
