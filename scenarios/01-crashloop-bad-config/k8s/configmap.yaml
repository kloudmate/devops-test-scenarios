# ConfigMap — intentionally BAD configuration to trigger CrashLoopBackOff
#
# Problems in this config:
# 1. DATABASE_URL uses "postgres://" instead of the required "postgresql://"
# 2. APP_PORT is set to "not-a-number"
# 3. LOG_LEVEL is set to "VERBOSE"
#
# To fix the CrashLoop update values.

apiVersion: v1
kind: ConfigMap
metadata:
  name: scenario-01-config
  namespace: test-scenerios
  labels:
    scenario: "01-crashloop-bad-config"

data:
  DATABASE_URL: "postgres://user:password@db-host:5432/mydb"
  APP_PORT: "not-a-number"
  LOG_LEVEL: "VERBOSE"
