---
# Scenario 09b: Missing imagePullSecret — triggers Unauthorized / ImagePullBackOff.
#
# This deployment references a valid image from a private registry but is missing
# the imagePullSecret required to authenticate with that registry.
#
# Observed symptoms:
#   kubectl get pods → STATUS = ImagePullBackOff
#   kubectl describe pod → Events show "unauthorized: authentication required"
#
# Fix: create the secret and reference it, e.g.:
#   kubectl create secret docker-registry my-registry-credentials \
#     --docker-server=<REGISTRY> \
#     --docker-username=<USER> \
#     --docker-password=<TOKEN>
#   Then add `imagePullSecrets: [{name: my-registry-credentials}]` to the pod spec.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-09-missing-secret
  namespace: test-scenerios
  labels:
    scenario: "09-imagepullbackoff"
    variant: missing-pull-secret
    app: scenario-09-missing-secret
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-09-missing-secret
  template:
    metadata:
      labels:
        app: scenario-09-missing-secret
        scenario: "09-imagepullbackoff"
    spec:
      containers:
        - name: app
          # Image from a private registry — authentication is required
          image: REGISTRY_PLACEHOLDER/scenario-01-crashloop-bad-config:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      # BUG: imagePullSecrets is missing — Kubernetes cannot authenticate
      # with the private registry and the pull will fail with "unauthorized"
      # imagePullSecrets:
      #   - name: my-registry-credentials
