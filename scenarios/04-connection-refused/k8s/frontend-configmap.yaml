# ConfigMap for the frontend service.
#
# BUG: BACKEND_URL points to port 9999 — the backend service listens on 5000.
# This mismatch causes every /api/proxy request to fail with "Connection refused"
# and return HTTP 502 to the caller.
#
# To fix: change BACKEND_URL to "http://scenario-04-backend:5000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scenario-04-frontend-config
  namespace: test-scenerios
  labels:
    scenario: "04-connection-refused"
data:
  APP_PORT: "8080"
  # BUG: wrong port — backend listens on 5000, not 9999
  BACKEND_URL: "http://scenario-04-backend:9999"
