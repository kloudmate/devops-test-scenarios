---
# ── Backend Service ────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: scenario-04-backend
  namespace: test-scenerios
  labels:
    scenario: "04-connection-refused"
spec:
  selector:
    app: scenario-04-backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  type: ClusterIP
---
# ── Frontend Service ───────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: scenario-04-frontend
  namespace: test-scenerios
  labels:
    scenario: "04-connection-refused"
spec:
  selector:
    app: scenario-04-frontend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
