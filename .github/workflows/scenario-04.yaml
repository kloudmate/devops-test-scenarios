name: Scenario 04 – Connection Refused to Internal Microservice

on:
  workflow_dispatch:

env:
  SCENARIO: "04-connection-refused"

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Test both services
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: |
          if [ -d "scenarios/04-connection-refused/tests" ]; then
            pytest scenarios/04-connection-refused/tests -v
          else
            echo "No tests found, skipping."
          fi


  # ─────────────────────────────────────────────
  # Job 2: Build and push both Docker images
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push backend image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/scenario-04-backend"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" scenarios/04-connection-refused/backend/app/
          docker push "${TAG}"
          docker push "${LATEST}"

      - name: Build and push frontend image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/scenario-04-frontend"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" scenarios/04-connection-refused/frontend/app/
          docker push "${TAG}"
          docker push "${LATEST}"


  # ─────────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute registry in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" scenarios/04-connection-refused/k8s/deployments.yaml

      - name: Apply manifests
        run: |
          kubectl apply -n test-scenerios -f scenarios/04-connection-refused/k8s/backend-configmap.yaml
          kubectl apply -n test-scenerios -f scenarios/04-connection-refused/k8s/frontend-configmap.yaml
          kubectl apply -n test-scenerios -f scenarios/04-connection-refused/k8s/deployments.yaml
          kubectl apply -n test-scenerios -f scenarios/04-connection-refused/k8s/services.yaml

      - name: Wait for pods to start
        run: |
          kubectl wait -n test-scenerios --for=condition=ready pod -l app=scenario-04-backend --timeout=180s || true
          kubectl wait -n test-scenerios --for=condition=ready pod -l app=scenario-04-frontend --timeout=180s || true
          kubectl get pods -n test-scenerios

      - name: Demonstrate the connection-refused error
        run: |
          set -euo pipefail

          FRONTEND_POD=$(kubectl get pods -n test-scenerios -l app=scenario-04-frontend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          BACKEND_POD=$(kubectl get pods -n test-scenerios -l app=scenario-04-backend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          echo "Frontend pod: ${FRONTEND_POD}"
          echo "Backend pod: ${BACKEND_POD}"

          if [ -z "$BACKEND_POD" ] || [ -z "$FRONTEND_POD" ]; then
            echo "Pods not found"
            kubectl get pods -n test-scenerios
            exit 1
          fi

          echo ""
          echo "=== Backend is healthy ==="
          kubectl exec -n test-scenerios "$BACKEND_POD" -- curl -s http://localhost:5000/api/data || true

          echo ""
          echo "=== Frontend returns 502 (wrong BACKEND_URL port) ==="
          kubectl exec -n test-scenerios "$FRONTEND_POD" -- curl -s http://localhost:8080/api/proxy || true

          echo ""
          echo "=== Frontend logs ==="
          kubectl logs -n test-scenerios "$FRONTEND_POD" --tail=20
