name: Scenario 02 – API Latency N+1 Queries

on:
  workflow_dispatch:

env:
  SCENARIO: "02-api-latency-n-plus-one"
  IMAGE_NAME: "scenario-02-api-latency-n-plus-one"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint / unit-test the application code
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scenarios/02-api-latency-n-plus-one/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scenarios/02-api-latency-n-plus-one/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ──────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to Artifact Registry
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/02-api-latency-n-plus-one/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute image in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/02-api-latency-n-plus-one/k8s/deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -n test-scenerios -f scenarios/02-api-latency-n-plus-one/k8s/configmap.yaml
          kubectl apply -n test-scenerios -f scenarios/02-api-latency-n-plus-one/k8s/deployment.yaml
          kubectl apply -n test-scenerios -f scenarios/02-api-latency-n-plus-one/k8s/service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/scenario-02-n-plus-one -n test-scenerios --timeout=300s

      - name: Demonstrate N+1 vs optimized query counts
        run: |
          POD=$(kubectl get pods -n test-scenerios \
            -l scenario=02-api-latency-n-plus-one \
            -o jsonpath='{.items[0].metadata.name}')
          echo "=== N+1 endpoint (expect X-Query-Count: 51) ==="
          kubectl exec "${POD}" -- wget -qS http://localhost:3000/api/orders -O /dev/null 2>&1 \
            | grep -i x-query-count || true
          echo "=== Optimized endpoint (expect X-Query-Count: 1) ==="
          kubectl exec "${POD}" -- wget -qS http://localhost:3000/api/orders/optimized -O /dev/null 2>&1 \
            | grep -i x-query-count || true
