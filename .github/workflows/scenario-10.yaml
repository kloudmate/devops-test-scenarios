name: Scenario 10 – Liveness Probe Failure (Deadlock)

on:
  workflow_dispatch:

env:
  SCENARIO: "10-liveness-probe-failure"
  IMAGE_NAME: "scenario-10-liveness-probe-failure"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scenarios/10-liveness-probe-failure/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: scenarios/10-liveness-probe-failure/app/go.mod

      - name: Run tests
        run: go test -v ./...

      - name: Build binary (verify it compiles)
        run: go build -o /dev/null .

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}" 
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"
          docker build -t "${TAG}" -t "${LATEST}" scenarios/10-liveness-probe-failure/app/
          docker push "${TAG}"
          docker push "${LATEST}"
          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute image in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/10-liveness-probe-failure/k8s/deployment.yaml

      - name: Deploy application
        run: |
          kubectl apply -n test-scenerios -f scenarios/10-liveness-probe-failure/k8s/configmap.yaml
          kubectl apply -n test-scenerios -f scenarios/10-liveness-probe-failure/k8s/deployment.yaml
          kubectl apply -n test-scenerios -f scenarios/10-liveness-probe-failure/k8s/service.yaml
          kubectl rollout status -n test-scenerios deployment/scenario-10-liveness-probe --timeout=180s
          
      - name: Trigger deadlock and observe liveness probe failures
        run: |
          POD=$(kubectl get pods -n test-scenerios \
                -l scenario=10-liveness-probe-failure \
                -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          
          if [ -z "$POD" ]; then
            echo "Pod not found"
            kubectl get pods -n test-scenerios
            exit 1
          fi
      
          echo "=== Sending 7 /work requests to trigger deadlock (DEADLOCK_AFTER=5) ==="
          for i in $(seq 1 7); do
            kubectl exec -n test-scenerios "${POD}" -- wget -qO- http://localhost:8080/work 2>/dev/null || true
            sleep 1
          done
      
          echo ""
          echo "=== Status after deadlock ==="
          kubectl exec -n test-scenerios "${POD}" -- wget -qO- http://localhost:8080/status 2>/dev/null || true
      
          echo ""
          echo "Waiting 60s for liveness probe to fail and restart the container..."
          sleep 60
      
          echo "=== Pod status (expect RESTARTS > 0) ==="
          kubectl get pods -n test-scenerios -l scenario=10-liveness-probe-failure
      
          echo ""
          echo "=== Liveness probe failure events ==="
          kubectl describe pod -n test-scenerios -l scenario=10-liveness-probe-failure \
            | grep -E "(Liveness|Killing|Unhealthy)" | head -15 || true
