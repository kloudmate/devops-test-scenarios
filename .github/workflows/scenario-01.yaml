name: Scenario 01 – CrashLoop Bad Config

on:
  workflow_dispatch:

env:
  SCENARIO: "01-crashloop-bad-config"
  IMAGE_NAME: "scenario-01-crashloop-bad-config"

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Lint / unit-test the application code
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scenarios/01-crashloop-bad-config/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: |
          if [ -d "../tests" ]; then
            pytest ../tests/ -v
          else
            echo "No tests found. Skipping."
          fi


  # ─────────────────────────────────────────────
  # Job 2: Build Docker image and push to Artifact Registry
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          echo "Building image: ${TAG}"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/01-crashloop-bad-config/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> $GITHUB_OUTPUT


  # ─────────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute registry in deployment manifest
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Show deployment YAML
        run: |
          cat scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Ensure namespace exists
        run: |
          kubectl create namespace test-scenerios --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMap
        run: |
          kubectl apply -n test-scenerios -f scenarios/01-crashloop-bad-config/k8s/configmap.yaml

      - name: Apply Deployment
        run: |
          set -x
          kubectl config current-context
          kubectl get ns
          kubectl apply -n test-scenerios -f scenarios/01-crashloop-bad-config/k8s/deployment.yaml
          kubectl get deploy -n test-scenerios
          kubectl get pods -n test-scenerios

      - name: Wait and show pod status
        run: |
          sleep 40
          kubectl get pods -n test-scenerios -l scenario=01-crashloop-bad-config
