name: Scenario 11 – Resource Quota Exceeded

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SCENARIO: "11-resource-quota-exceeded"
  IMAGE_NAME: "scenario-11-resource-quota-exceeded"
  NAMESPACE: "scenario-11"


jobs:

# ─────────────────────────────────────────────
# Job 1: Lint / unit-test the application code
# ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: scenarios/11-resource-quota-exceeded/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Run unit tests
        run: |
          if [ -d "../tests" ]; then
            echo "Running tests..."
            pytest ../tests/ -v
          else
            echo "No tests directory found. Skipping tests."
            exit 0
          fi


# ─────────────────────────────────────────────
# Job 2: Build Docker image and push to GHCR
# ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          echo "Building image: ${TAG}"

          docker build \
            -f scenarios/11-resource-quota-exceeded/app/Dockerfile \
            -t "${TAG}" \
            -t "${LATEST}" \
            scenarios/11-resource-quota-exceeded/app

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────
# Job 3: Deploy to GKE
# ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
  
    permissions:
      contents: read
  
    steps:
      - uses: actions/checkout@v4
  
  # Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
  
  # Install gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
  
  # Get cluster credentials
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}
  
  # Ensure namespace exists
      - name: Ensure namespace exists
        run: |
          kubectl create namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -
  
  # Apply ResourceQuota
      - name: Apply resource quota
        run: |
          kubectl apply -n "${NAMESPACE}" -f scenarios/11-resource-quota-exceeded/k8s/quota.yaml
  
  # Apply Deployment
      - name: Deploy application
        run: |
          kubectl apply -n "${NAMESPACE}" -f scenarios/11-resource-quota-exceeded/k8s/deployment.yaml
  
  # Wait for deployment attempt
      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/scenario-11-app -n "${NAMESPACE}" --timeout=120s || true
  
  # Show quota status
      - name: Show resource quota
        run: |
          echo "=== ResourceQuota ==="
          kubectl get resourcequota -n "${NAMESPACE}"
          kubectl describe resourcequota -n "${NAMESPACE}"
  
  # Show pod status
      - name: Show pods
        run: |
          echo "=== Pods ==="
          kubectl get pods -n "${NAMESPACE}" -o wide || true
  
  # Show quota failure events
      - name: Show quota errors
        run: |
          echo "=== ReplicaSet Events ==="
          kubectl get rs -n "${NAMESPACE}"
          kubectl describe rs -n "${NAMESPACE}" | grep -A5 -E "FailedCreate|exceeded quota" || true
