name: Scenario 07 – DNS Resolution Failure

on:
  workflow_dispatch:

env:
  SCENARIO: "07-dns-resolution-failure"
  IMAGE_NAME: "scenario-07-dns-resolution-failure"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: pytest scenarios/07-dns-resolution-failure/tests/ -v

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}" 
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"
          docker build -t "${TAG}" -t "${LATEST}" scenarios/07-dns-resolution-failure/app/
          docker push "${TAG}"
          docker push "${LATEST}"
          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute image in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/07-dns-resolution-failure/k8s/deployment.yaml

      - name: Deploy app (normal DNS)
        run: |
          kubectl apply -n test-scenerios -f scenarios/07-dns-resolution-failure/k8s/configmap.yaml
          kubectl apply -n test-scenerios -f scenarios/07-dns-resolution-failure/k8s/deployment.yaml
          kubectl apply -n test-scenerios -f scenarios/07-dns-resolution-failure/k8s/service.yaml
          kubectl rollout status -n test-scenerios deployment/scenario-07-dns-check --timeout=120s || true

      - name: Show healthy DNS check
        run: |
          POD=$(kubectl get pods -n test-scenerios -l scenario=07-dns-resolution-failure \
                    -o jsonpath='{.items[0].metadata.name}')
          echo "=== DNS check (healthy) ==="
          kubectl exec -n test-scenerios "${POD}" -- python3 -c "
          import urllib.request, json
          r = urllib.request.urlopen('http://localhost:8080/dns-check')
          print(json.loads(r.read()))
          " || true

      - name: Apply broken CoreDNS (triggers DNS failure)
        run: |
          echo "⚠️  Applying broken CoreDNS ConfigMap — DNS will fail for ~30s"
          kubectl apply -f scenarios/07-dns-resolution-failure/k8s/broken-coredns-configmap.yaml
          kubectl rollout restart deployment -n kube-system coredns || \
          kubectl rollout restart deployment -n kube-system kube-dns
          sleep 15

      - name: Show DNS failure
        run: |
          POD=$(kubectl get pods -n test-scenerios -l scenario=07-dns-resolution-failure \
                  -o jsonpath='{.items[0].metadata.name}')
          
          kubectl exec -n test-scenerios "${POD}" -- python3 -c "
          import urllib.request, json
          r = urllib.request.urlopen('http://localhost:8080/dns-check')
          print(json.loads(r.read()))
          " 2>&1 || true

      - name: Restore healthy CoreDNS
        if: always()
        run: |
          kubectl apply -n kube-system -f scenarios/07-dns-resolution-failure/k8s/healthy-coredns-configmap.yaml
          kubectl rollout restart deployment -n kube-system coredns || \
          kubectl rollout restart deployment -n kube-system kube-dns
          echo "CoreDNS restored to healthy state"
