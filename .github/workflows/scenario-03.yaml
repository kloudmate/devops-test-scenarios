name: Scenario 03 – OOMKilled Memory Leak

on:
  workflow_dispatch:

env:
  SCENARIO: "03-oomkilled-memory-leak"
  IMAGE_NAME: "scenario-03-oomkilled-memory-leak"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build and test the Go application
  # ─────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scenarios/03-oomkilled-memory-leak/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: scenarios/03-oomkilled-memory-leak/app/go.mod

      - name: Run tests
        run: go test -v ./...

      - name: Build binary (verify it compiles)
        run: go build -o /dev/null .

  # ──────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to Artifact Registry
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/03-oomkilled-memory-leak/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute image in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/03-oomkilled-memory-leak/k8s/deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -n test-scenerios -f scenarios/03-oomkilled-memory-leak/k8s/configmap.yaml
          kubectl apply -n test-scenerios -f scenarios/03-oomkilled-memory-leak/k8s/deployment.yaml
          kubectl apply -n test-scenerios -f scenarios/03-oomkilled-memory-leak/k8s/service.yaml

      - name: Wait for initial rollout
        run: |
          kubectl rollout status deployment/scenario-03-oomkilled -n test-scenerios --timeout=120s

      - name: Trigger memory leak and wait for OOMKilled
        run: |
          POD=$(kubectl get pods -n test-scenerios \
              -l scenario=03-oomkilled-memory-leak \
              -o jsonpath='{.items[0].metadata.name}')

          echo "Triggering leak requests..."
          for i in $(seq 1 5); do
            kubectl exec -n test-scenerios "${POD}" -- \
              wget -qO- http://localhost:8080/leak 2>/dev/null || true
            sleep 2
          done

          echo "Waiting 30s for OOMKill..."
          sleep 30

          echo "=== Pod status ==="
          kubectl get pods -n test-scenerios -l scenario=03-oomkilled-memory-leak

          echo "=== Pod description (look for OOMKilled) ==="
          kubectl describe pod -n test-scenerios -l scenario=03-oomkilled-memory-leak \
            | grep -A 10 "Last State:" || true
